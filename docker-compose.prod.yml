version: '3.8'

services:
  api:
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  worker:
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  frontend:
    restart: always

  mysql:
    restart: always

  redis:
    restart: always
